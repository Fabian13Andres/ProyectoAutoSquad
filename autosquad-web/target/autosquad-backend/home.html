<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Home: AutoSquad</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">

    <!-- CSS integrado -->
    <style>
        /* ===== Estilo general ===== */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #b91c1c;
            /* rojo de fondo */
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            /* no centrado vertical */
            padding-top: 40px;
        }

        /* ===== Contenedor principal ===== */
        .container {
            background-color: #93c5fd;
            /* azul clarito */
            padding: 30px 35px;
            border-radius: 16px;
            border: 2px solid #000;
            /* borde negro */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 500px;
            margin: 0 auto;
            color: #1e293b;
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #1e293b;
        }

        p {
            margin-bottom: 25px;
        }

        /* ===== Botones ===== */
        .acciones {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .acciones button {
            width: 100%;
            margin: 0;
        }

        .acciones button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(29, 78, 216, 0.4);
        }

        a {
            color: #1e293b;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>AutoSquad</h1>

        <p>Bienvenido de nuevo.</p>

        <div class="acciones">
            <button onclick="location.href='cajas.html'">
                Buscar Cajas
            </button>
            <button onclick="location.href='perfil.html'">
                Perfil
            </button>
        </div>

        <div style="margin-top: 20px;">
            <a href="logout">Cerrar sesión</a>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async function () {
            try {
                const response = await fetch("dashboard", {
                    method: "GET",
                    credentials: "include"
                });

                if (response.redirected) {
                    window.location.href = "login.html";
                }

            } catch (error) {
                console.error("Error verificando sesión:", error);
                window.location.href = "login.html";
            }

        });
    </script>

</body>

</html>
