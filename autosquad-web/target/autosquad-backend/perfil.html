<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Perfil: AutoSquad</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">

    <!-- CSS integrado directamente -->
    <style>
        /* ===== Estilo general de la app ===== */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #b91c1c; /* fondo rojo */
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            padding-top: 40px;
        }

        /* ===== Contenedor principal ===== */
        .container {
            background-color: #93c5fd; /* azul clarito */
            padding: 30px 35px;
            border-radius: 16px;
            border: 2px solid #000000; /* borde negro */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 500px;
            margin: 0 auto;
            color: #1e293b;
        }

        /* ===== Títulos ===== */
        h1 {
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1e293b;
        }

        /* ===== Enlaces ===== */
        a {
            color: #1d4ed8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Mi Perfil</h1>

    <!-- Aquí se mostrará el nombre que viene del servidor -->
    <p><b>Nombre:</b> <span id="nombre"></span></p>

    <br>

    <!-- Botón para volver al inicio -->
    <a href="home.html">Volver</a>

    <br><br>

    <!-- Cerrar sesión invalida la sesión en el servidor -->

</div>

</body>
</html>
