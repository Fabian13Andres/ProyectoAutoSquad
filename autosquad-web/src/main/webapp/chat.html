<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Chat: AutoSquad</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #EF7C85;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            padding-top: 40px;
        }

        .container {
            background-color: #93c5fd;
            padding: 30px 35px;
            border-radius: 16px;
            border: 2px solid #000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 500px;
            margin: 0 auto;
            color: #1e293b;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1e293b;
            text-decoration-line: underline;
        }

        #mensajes {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #000;
            padding: 12px;
            border-radius: 8px;
            background-color: #bfdbfe;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #000;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
        }

        button {
            padding: 12px 25px;
            margin: 15px 0px;
            border-radius: 6px;
            border: 2px solid black;
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(29, 78, 216, 0.4);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            color: black;
            text-decoration: none;
            color: #1d4ed8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: red;
        }

        div {
            height: 50%;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Chat</h1>

        <div id="mensajes"></div>

        <div style="margin-top: 15px;">
            <input type="text" id="texto" placeholder="Escribe un mensaje" autocomplete="off">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>

        <div style="margin-top: 20px;">
            <a href="cajas.html">Volver</a>
        </div>

    </div>

    <script>
        const usuarioId = localStorage.getItem("usuarioId");
        if (!usuarioId) window.location.href = "login.html";

        const params = new URLSearchParams(window.location.search);
        const idCaja = params.get("id_caja");
        if (!idCaja) window.location.href = "cajas.html";

        async function cargarMensajes() {
            try {
                const response = await fetch(`http://192.168.18.249:8080/autosquad-api/mensaje/list?id_caja=${idCaja}`)
                const data = await response.json();
                const div = document.getElementById("mensajes");
                div.innerHTML = "";
                if (!data.success) return;
                data.mensajes.forEach(m => {
                    div.innerHTML += `<p><strong>${m.nombre_usuario}:</strong> ${m.texto}</p>`;
                });
                div.scrollTop = div.scrollHeight;
            } catch (error) {
                console.error("Error cargando mensajes:", error);
            }
        }

        async function enviarMensaje() {
            const input = document.getElementById("texto");
            const texto = input.value.trim();
            if (!texto) return;

            const formData = new URLSearchParams();
            formData.append("id_caja", idCaja);
            formData.append("id_usuario", usuarioId);
            formData.append("texto", texto);

            try {
                const response = await fetch(`http://192.168.18.249:8080/autosquad-api/mensaje/create`, {
                    method: "POST",
                    body: formData,
                    credentials: "include",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" }
                });
                const result = await response.json();
                if (result.success) {
                    input.value = "";
                    cargarMensajes();
                } else {
                    alert(result.error);
                }
            } catch (error) {
                console.error("Error enviando mensaje:", error);
            }
        }

        setInterval(cargarMensajes, 3000);
        cargarMensajes();
    </script>

</body>

</html>
