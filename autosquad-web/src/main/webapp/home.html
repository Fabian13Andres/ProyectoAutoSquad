<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Home: AutoSquad</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #EF7C85;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            padding-top: 40px;
        }

        .container {
            background-color: #93c5fd;
            padding: 30px 35px;
            border-radius: 16px;
            border: 2px solid #000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 500px;
            margin: 0 auto;
            color: #1e293b;
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #1e293b;
            text-decoration-line: underline;

        }

        p {
            margin-bottom: 25px;
        }

        .acciones {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .acciones button {
            padding: 12px 25px;
            margin: 5px 10px;
            border-radius: 6px;
            border: 2px solid black;
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .acciones button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(29, 78, 216, 0.4);
        }

        a {
            color: #1e293b;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        div {
            height: 50%;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>AutoSquad</h1>
        <p id="bienvenida">Bienvenido de nuevo</p>

        <div class="acciones">
            <button onclick="location.href='crear_caja.html'">Crear Caja</button>
            <button onclick="location.href='cajas.html'">Buscar Cajas</button>
            <button onclick="location.href='perfil.html'">Perfil</button>
            <button id="cerrarSesion">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        // Verificar si el usuario está logueado
        const nombreUsuario = localStorage.getItem("usuarioNombre");
        const usuarioId = localStorage.getItem("usuarioId");

        if (!usuarioId || !nombreUsuario) {
            // Si no hay usuario guardado, redirige a login
            window.location.href = "login.html";
        } else {
            // Mostrar mensaje de bienvenida
            document.getElementById("bienvenida").textContent = `Bienvenido ${nombreUsuario}`;
        }

        // Cerrar sesión: limpiar localStorage y volver al login
        document.getElementById("cerrarSesion").addEventListener("click", () => {
            localStorage.removeItem("usuarioId");
            localStorage.removeItem("usuarioNombre");
            window.location.href = "login.html";
        });
    </script>
</body>

</html>
