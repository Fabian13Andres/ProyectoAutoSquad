<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cajas: AutoSquad</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #EF7C85;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            padding-top: 40px;
        } 

        .container {
            background-color: #93c5fd;
            padding: 30px 35px;
            border-radius: 16px;
            border: 2px solid #000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 500px;
            margin: 0 auto;
            color: #1e293b;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1e293b;
            text-decoration-line: underline;
        }

        .filtro-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        select {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #000;
            outline: none;
        }

        button {
            width: 150px;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 12px 25px;
            border-radius: 6px;
            border: 2px solid black;
            font-weight: bold;
        }

        button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(29, 78, 216, 0.4);
        }

        #lista div button {
            margin-top: 8px;
            width: 100%;
            background-color: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            border: 2px solid black;
        }

        #lista div button:hover {
            background-color: #1d4ed8;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            color: #1d4ed8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: red;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Cajas Disponibles</h1>
        <div class="filtro-container">
            <select id="filtro">
                <option value="">Todos</option>
                <option value="Valorant">Valorant</option>
                <option value="LoL">LoL</option>
                <option value="CS2">CS2</option>
            </select>
            <button onclick="cargarCajas()">Buscar</button>
        </div>
        <div id="lista"></div>
        <div style="margin-top: 20px;">
            <a href="home.html">Volver</a>
        </div>
    </div>

    <script>
        const API_BASE = "http://192.168.18.249:8080/autosquad-api";
        const idUsuario = localStorage.getItem("usuarioId");
        if (!idUsuario) window.location.href = "login.html";

        // Escapar HTML y reemplazar saltos de línea
        function escaparHtml(texto) {
            if (!texto) return '';
            return texto
                .toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\r?\n/g, "<br>");
        }

        async function cargarCajas() {
            const juego = document.getElementById("filtro").value;
            let url = `${API_BASE}/caja/list`;
            if (juego) url += "?juego=" + encodeURIComponent(juego);

            const lista = document.getElementById("lista");
            lista.innerHTML = "Cargando cajas...";

            try {
                const response = await fetch(url);
                const data = await response.json().catch(() => null);

                if (!data || !data.success || !Array.isArray(data.cajas)) {
                    console.error("Respuesta inválida de la API:", data);
                    lista.innerHTML = "No se pudo cargar la información del servidor";
                    return;
                }

                lista.innerHTML = "";
                let count = 0;
                const ahora = Math.floor(Date.now() / 1000); // timestamp en segundos

                data.cajas.forEach(caja => {
                    try {
                        const jugadores = Number(caja.jugadores_buscados);
                        if (isNaN(jugadores) || jugadores <= 0) return;

                        const horaCaja = Number(caja.hora_creacion);
                        if (isNaN(horaCaja) || (ahora - horaCaja > 3600)) return; // última hora

                        const nombreJuego = escaparHtml(caja.nombre_juego) || 'Desconocido';
                        const creador = escaparHtml(caja.creador_nombre) || 'Desconocido';
                        const requisitos = escaparHtml(caja.requisitos) || 'Ninguno';

                        const div = document.createElement("div");
                        div.style.border = "1px solid #000";
                        div.style.margin = "10px 0";
                        div.style.padding = "10px";
                        div.style.borderRadius = "6px";
                        div.style.backgroundColor = "#bfdbfe";

                        div.innerHTML = `
                            <strong>${nombreJuego}</strong><br>
                            Creador: ${creador}<br>
                            Requisitos: ${requisitos}<br>
                            Jugadores: ${jugadores}<br>
                            <button onclick="abrirChat(${caja.id_caja || 0})">Entrar</button>
                        `;
                        lista.appendChild(div);
                        count++;
                    } catch (e) {
                        console.warn("Caja inválida ignorada:", caja, e);
                    }
                });

                if (count === 0) {
                    lista.innerHTML = "No hay cajas creadas en la última hora";
                }

            } catch (error) {
                console.error("Error conectando con el servidor:", error);
                lista.innerHTML = "No se pudo conectar con el servidor";
            }
        }

        function abrirChat(id) {
            if (!id) return;
            window.location.href = "chat.html?id_caja=" + id;
        }

        document.addEventListener("DOMContentLoaded", () => {
            cargarCajas();
        });
    </script>
</body>
</html>
