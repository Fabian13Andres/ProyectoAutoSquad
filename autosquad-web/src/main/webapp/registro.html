<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro: AutoSquad</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">

    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background-color: #EF7C85;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
        }

        .container {
            width: 70%;
            max-width: 500px;
            min-height: 500px;
            background-color: #93c5fd;
            padding: 50px;
            border-radius: 10px;
            border: 4px solid black;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #03045e;
            font-size: 28px;
            text-decoration-line: underline;
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 6px;
            border: 2px solid #000;
            font-size: 15px;
        }

        button {
            padding: 12px 25px;
            margin: 15px 10px;
            border-radius: 6px;
            border: 2px solid black;
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(29, 78, 216, 0.4);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            color: black;
            text-decoration: none;
            color: #1d4ed8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: red;
        }

        #resultado {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Registro de Usuario</h1>

        <form id="registerForm" autocomplete="off">
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <input type="password" name="contra" placeholder="Contraseña" required>
            <button type="submit">Registrar</button>
        </form>

        <p id="resultado"></p>
        <a href="login.html">Volver al login</a>
    </div>

    <script>
        const form = document.getElementById("registerForm");
        const resultado = document.getElementById("resultado");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = new URLSearchParams(new FormData(form));

            try {
                const API_BASE = "http://192.168.18.249:8080/autosquad-api";
                const response = await fetch(`${API_BASE}/register`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    resultado.textContent = "Usuario registrado correctamente";
                    form.reset();
                } else {
                    resultado.textContent = data.error;
                }
            } catch (err) {
                resultado.textContent = "Error al conectar con el servidor";
                console.error("Error en registro:", err);
            }
        });
    </script>
</body>

</html>
