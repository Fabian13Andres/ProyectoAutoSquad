<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Caja: AutoSquad</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #EF7C85;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            padding-top: 40px;
        }

        .container {
            background-color: #93c5fd;
            padding: 30px 35px;
            border-radius: 16px;
            border: 2px solid #000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 500px;
            margin: 0 auto;
            color: #1e293b;
        }

        h1 {
            margin-bottom: 25px;
            letter-spacing: 1px;
            color: #1e293b;
            text-decoration-line: underline;

        }

        .form-group {
            width: 100%;
            margin-bottom: 10px;
        }

        select,
        input[type="text"],
        input[type="number"] {
            width: 95%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #000;
            outline: none;
        }

        select {
            width: 20%;
        }

        select:focus,
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
        }

        .acciones {
            display: flex;
            justify-content: space-between;
        }

        .acciones button {
            margin-top: 20px;
            width: 48%;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 12px 25px;
            border-radius: 6px;
            border: 2px solid black;
            font-weight: bold;
        }

        .acciones button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(29, 78, 216, 0.4);
        }

        input {
            width: auto;
        }

        #resultado {
            margin-top: 15px;
            font-weight: 500;
            color: #16a34a;
        }

        div {
            height: 50%;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Crear Nueva Caja</h1>

        <div class="form-group">
            <select id="juego">
                <option value="1">Valorant</option>
                <option value="2">LoL</option>
                <option value="3">CS2</option>
            </select>
        </div>

        <div class="form-group">
            <input type="text" id="requisitos" placeholder="Requisitos" autocomplete="off">
            <input type="number" id="jugadores" placeholder="Jugadores buscados" min="1">
        </div>

        <div class="acciones">
            <button onclick="crearCaja()">Crear</button>
            <button onclick="volver()">Volver</button>
        </div>

        <p id="resultado"></p>

    </div>

    <script>
        const API_BASE = "http://192.168.18.249:8080/autosquad-api";

        async function crearCaja() {
            const idUsuario = localStorage.getItem("usuarioId");
            const idJuego = document.getElementById("juego").value;
            const requisitos = document.getElementById("requisitos").value;
            const jugadores = document.getElementById("jugadores").value;

            const params = new URLSearchParams();
            params.append("id_creador", idUsuario);
            params.append("id_juego", idJuego);
            params.append("requisitos", requisitos);
            params.append("jugadores", jugadores);

            const resultado = document.getElementById("resultado");

            try {
                const response = await fetch(`${API_BASE}/caja/create`, {
                    method: "POST",
                    body: params,
                    headers: { "Content-Type": "application/x-www-form-urlencoded" }
                });

                const data = await response.json();

                if (data.success) {
                    resultado.textContent = "Caja creada correctamente";
                } else {
                    resultado.textContent = data.error;
                }

            } catch (error) {
                resultado.textContent = "Error de conexión";
                console.error(error);
            }
        }

        function volver() {
            window.location.href = "home.html";
        }
    </script>

</body>

</html>
